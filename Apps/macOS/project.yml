name: Winnow
options:
  bundleIdPrefix: com.keranm
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  generateEmptyDirectories: true

packages:
  WinnowCore:
    path: ../../Packages/WinnowCore
  WinnowUI:
    path: ../../Packages/WinnowUI

targets:
  Winnow:
    type: application
    platform: macOS
    bundleId: com.keranm.winnow
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
    dependencies:
      - package: WinnowCore
      - package: WinnowUI
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: Winnow
        PRODUCT_BUNDLE_IDENTIFIER: com.keranm.winnow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/Winnow.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: AUEPCDGA5G
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_FILE: Resources/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          ENABLE_TESTABILITY: YES
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

schemes:
  Winnow:
    build:
      targets:
        Winnow: all
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.SQLDebug 0": false
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
